apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def didiNowVersionCode = 8082
def didiNowVersionName = "8.0.82"

android {
    namespace "com.didisnow.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.didisnow.app"
        minSdkVersion 23
        targetSdkVersion 34
        // Increase for every Play upload — must be strictly > highest previously uploaded code
        versionCode didiNowVersionCode
        versionName didiNowVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged APK
             ignoreAssetsPattern "!.svn:!.git:.*:!CVS:!thumbs.db:!picasa.ini:!*.scc:*~"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    plugins.withId('kotlin-android') {
        kotlinOptions {
            jvmTarget = "17"
        }
    }

    // Load signing configuration if signing.properties exists
    def signingPropsFile = file('../../signing.properties')
    if (signingPropsFile.exists()) {
        def signingProps = new Properties()
        signingProps.load(new FileInputStream(signingPropsFile))
        
        signingConfigs {
            release {
                storeFile file(signingProps['storeFile'])
                storePassword signingProps['storePassword']
                keyAlias signingProps['keyAlias']
                keyPassword signingProps['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            if (signingPropsFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

androidComponents {
    onVariants(selector().withBuildType("release")) { variant ->
        variant.outputs.each { output ->
            output.versionCode.set(didiNowVersionCode)
            output.versionName.set(didiNowVersionName)
        }
    }
}

tasks.register("verifyDidiNowReleaseVersion") {
    def expectedCode = didiNowVersionCode
    def expectedName = didiNowVersionName
    doLast {
        def metadataFile = file("$buildDir/outputs/bundle/release/output-metadata.json")
        if (!metadataFile.exists()) {
            throw new GradleException("Release bundle metadata not found: ${metadataFile}")
        }

        def metadata = new JsonSlurper().parse(metadataFile)
        def element = metadata.elements?.find { it.outputFile == "app-release.aab" } ?: metadata.elements?.first()
        def actualCode = element?.versionCode as Integer
        def actualName = element?.versionName as String

        if (actualCode != expectedCode || actualName != expectedName) {
            throw new GradleException("Wrong release version in AAB metadata: versionCode=${actualCode}, versionName=${actualName}; expected versionCode=${expectedCode}, versionName=${expectedName}")
        }

        println "Verified release AAB metadata: versionCode=${actualCode}, versionName=${actualName}"
    }
}

tasks.matching { it.name == "bundleRelease" }.configureEach {
    finalizedBy("verifyDidiNowReleaseVersion")
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Razorpay native SDK for UPI intent & native checkout
    implementation 'com.razorpay:checkout:1.6.40'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}