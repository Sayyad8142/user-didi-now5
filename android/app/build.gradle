apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

// ---------------------------------------------------------------------
// Load versioning from the single source of truth: android/version.properties
// Do NOT hardcode versionCode / versionName anywhere else.
// ---------------------------------------------------------------------
def versionPropsFile = file('../version.properties')
if (!versionPropsFile.exists()) {
    throw new GradleException("Missing android/version.properties — this file is the single source of truth for versionCode and versionName.")
}
def versionProps = new Properties()
versionPropsFile.withInputStream { versionProps.load(it) }

def rawVersionCode = versionProps['versionCode']
def rawVersionName = versionProps['versionName']
def rawMinVersionCode = versionProps['minVersionCode']

if (rawVersionCode == null || rawVersionCode.trim().isEmpty()) {
    throw new GradleException("android/version.properties is missing 'versionCode'.")
}
if (rawVersionName == null || rawVersionName.trim().isEmpty()) {
    throw new GradleException("android/version.properties is missing 'versionName'.")
}
if (rawMinVersionCode == null || rawMinVersionCode.trim().isEmpty()) {
    throw new GradleException("android/version.properties is missing 'minVersionCode' (highest code already published to Play).")
}

def didiNowVersionCode = rawVersionCode.trim().toInteger()
def didiNowVersionName = rawVersionName.trim()
def didiNowMinVersionCode = rawMinVersionCode.trim().toInteger()

if (didiNowVersionCode <= didiNowMinVersionCode) {
    throw new GradleException(
        "Invalid versionCode=${didiNowVersionCode} in android/version.properties. " +
        "Must be strictly greater than minVersionCode=${didiNowMinVersionCode}. " +
        "Bump versionCode before building a Play Store release."
    )
}

android {
    namespace "com.didisnow.app"
    compileSdkVersion rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.didisnow.app"
        minSdkVersion 23
        targetSdkVersion 34
        // Values come from android/version.properties — never edit here.
        versionCode didiNowVersionCode
        versionName didiNowVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged APK
             ignoreAssetsPattern "!.svn:!.git:.*:!CVS:!thumbs.db:!picasa.ini:!*.scc:*~"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    plugins.withId('kotlin-android') {
        kotlinOptions {
            jvmTarget = "17"
        }
    }

    // Load signing configuration if signing.properties exists
    def signingPropsFile = file('../../signing.properties')
    if (signingPropsFile.exists()) {
        def signingProps = new Properties()
        signingProps.load(new FileInputStream(signingPropsFile))
        
        signingConfigs {
            release {
                storeFile file(signingProps['storeFile'])
                storePassword signingProps['storePassword']
                keyAlias signingProps['keyAlias']
                keyPassword signingProps['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            if (signingPropsFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

androidComponents {
    onVariants(selector().withBuildType("release")) { variant ->
        variant.outputs.each { output ->
            output.versionCode.set(didiNowVersionCode)
            output.versionName.set(didiNowVersionName)
        }
    }
}

// Pre-build guard: validates version.properties BEFORE any release build runs.
tasks.register("validateDidiNowReleaseVersion") {
    def expectedCode = didiNowVersionCode
    def expectedName = didiNowVersionName
    def minCode = didiNowMinVersionCode
    doLast {
        if (expectedCode == null) {
            throw new GradleException("versionCode is missing.")
        }
        if (expectedName == null || expectedName.isEmpty()) {
            throw new GradleException("versionName is missing.")
        }
        if (expectedCode <= minCode) {
            throw new GradleException(
                "versionCode=${expectedCode} must be > minVersionCode=${minCode}. " +
                "Bump versionCode in android/version.properties before building."
            )
        }
        println "Release version OK: versionCode=${expectedCode}, versionName=${expectedName} (minVersionCode=${minCode})"
    }
}

// Post-build guard: confirms the produced AAB actually contains the expected version.
tasks.register("verifyDidiNowReleaseVersion") {
    def expectedCode = didiNowVersionCode
    def expectedName = didiNowVersionName
    doLast {
        def metadataFile = file("$buildDir/outputs/bundle/release/output-metadata.json")
        if (!metadataFile.exists()) {
            throw new GradleException("Release bundle metadata not found: ${metadataFile}")
        }

        def metadata = new JsonSlurper().parse(metadataFile)
        def element = metadata.elements?.find { it.outputFile == "app-release.aab" } ?: metadata.elements?.first()
        def actualCode = element?.versionCode as Integer
        def actualName = element?.versionName as String

        if (actualCode != expectedCode || actualName != expectedName) {
            throw new GradleException("Wrong release version in AAB metadata: versionCode=${actualCode}, versionName=${actualName}; expected versionCode=${expectedCode}, versionName=${expectedName}")
        }

        println "Verified release AAB metadata: versionCode=${actualCode}, versionName=${actualName}"
    }
}

tasks.matching { it.name == "bundleRelease" || it.name == "assembleRelease" }.configureEach {
    dependsOn("validateDidiNowReleaseVersion")
    finalizedBy("verifyDidiNowReleaseVersion")
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Razorpay native SDK for UPI intent & native checkout
    implementation 'com.razorpay:checkout:1.6.40'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}