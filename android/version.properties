# =====================================================================
# SINGLE SOURCE OF TRUTH for Android app versioning (User App).
#
# Rules:
#   1. Bump versionCode by +1 (or more) for EVERY Play Store upload.
#   2. versionCode MUST be strictly greater than minVersionCode.
#   3. After a successful Play upload, set minVersionCode to the value
#      you just uploaded so a future accidental downgrade fails the build.
#   4. Keep src/config/version.ts in sync (used for in-app display).
#
# Do NOT edit versionCode/versionName from Android Studio — change them
# here only. The Gradle build reads these values automatically.
# =====================================================================

versionCode=5
versionName=5.0

# Highest versionCode already accepted by Google Play.
# The build will FAIL if versionCode <= minVersionCode.
minVersionCode=4
