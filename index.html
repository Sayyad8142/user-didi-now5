<!DOCTYPE html>
<html lang="en" style="background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%); min-height: 100%;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://paywwbuqycovjopryele.supabase.co" crossorigin>
    <title>Didi Now - Delivery in 10 Minutes</title>
    <meta name="description" content="Didi Now - Your neighborhood delivery service. Get anything delivered in just 10 minutes!" />
    <meta name="keywords" content="delivery, 10 minutes, food delivery, maid service, cook service, Didi Now" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Didi Now" />

    <meta property="og:title" content="Didi Now - Delivery in 10 Minutes" />
    <meta property="og:description" content="Your neighborhood delivery service. Get anything delivered in just 10 minutes!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Prevent black flash by setting background immediately -->
    <style>
      html, body {
        background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%) !important;
        min-height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <!-- Didi Now App Launcher -->
    <div id="app-splash" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    ">
      <!-- Logo Container with glow effect -->
      <div style="
        background: rgba(255, 255, 255, 0.95);
        padding: 2.5rem 3rem;
        border-radius: 2.5rem;
        box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.3), 0 0 80px rgba(255, 255, 255, 0.3);
        text-align: center;
        backdrop-filter: blur(12px);
        animation: logoFloat 2s ease-in-out infinite;
      ">
        <!-- App Icon/Logo -->
        <div style="
          width: 80px;
          height: 80px;
          margin: 0 auto 1rem;
          background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%);
          border-radius: 1.25rem;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 8px 24px rgba(236, 72, 153, 0.4);
        ">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        
        <h1 style="
          font-size: 2.25rem;
          font-weight: 800;
          background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          margin: 0 0 0.25rem 0;
          letter-spacing: -0.5px;
        ">Didi Now</h1>
        
        <p style="
          font-size: 1rem;
          color: #9ca3af;
          margin: 0;
          font-weight: 500;
        ">in 10 Minutes</p>
      </div>
      
      <!-- Loading indicator -->
      <div style="
        margin-top: 2.5rem;
        display: flex;
        gap: 8px;
        align-items: center;
      ">
        <div style="
          width: 10px;
          height: 10px;
          background: rgba(255, 255, 255, 0.9);
          border-radius: 50%;
          animation: bounce 1.4s ease-in-out infinite;
        "></div>
        <div style="
          width: 10px;
          height: 10px;
          background: rgba(255, 255, 255, 0.9);
          border-radius: 50%;
          animation: bounce 1.4s ease-in-out 0.2s infinite;
        "></div>
        <div style="
          width: 10px;
          height: 10px;
          background: rgba(255, 255, 255, 0.9);
          border-radius: 50%;
          animation: bounce 1.4s ease-in-out 0.4s infinite;
        "></div>
      </div>
      
      <!-- Loading text -->
      <p style="
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.875rem;
        font-weight: 500;
        animation: pulse 2s ease-in-out infinite;
      ">Loading your home services...</p>
    </div>
    
    <style>
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
    </style>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Remove splash screen when React signals ready
      window.hideSplash = function() {
        const splash = document.getElementById('app-splash');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.3s ease-out';
          setTimeout(function() {
            splash.remove();
          }, 300);
        }
      };
    </script>
  </body>
</html>
