<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://paywwbuqycovjopryele.supabase.co" crossorigin>
    <title>Didi Now - Delivery in 10 Minutes</title>
    <meta name="description" content="Didi Now - Your neighborhood delivery service. Get anything delivered in just 10 minutes!" />
    <meta name="keywords" content="delivery, 10 minutes, food delivery, maid service, cook service, Didi Now" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Didi Now" />

    <meta property="og:title" content="Didi Now - Delivery in 10 Minutes" />
    <meta property="og:description" content="Your neighborhood delivery service. Get anything delivered in just 10 minutes!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Instant splash screen to prevent black screen -->
    <div id="app-splash" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #ec4899 0%, #f472b6 50%, #fbbf24 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    ">
      <div style="
        background: rgba(255, 255, 255, 0.95);
        padding: 2rem;
        border-radius: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        text-align: center;
        backdrop-filter: blur(8px);
      ">
        <h1 style="
          font-size: 2.5rem;
          font-weight: 700;
          color: #ec4899;
          margin: 0 0 0.5rem 0;
        ">Didi Now</h1>
        <p style="
          font-size: 1.25rem;
          color: #6b7280;
          margin: 0;
        ">in 10Mins</p>
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #f3f4f6;
          border-top: 3px solid #ec4899;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin: 1.5rem auto 0;
        "></div>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Remove splash screen when React signals ready
      window.hideSplash = function() {
        const splash = document.getElementById('app-splash');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.3s ease-out';
          setTimeout(function() {
            splash.remove();
          }, 300);
        }
      };
    </script>
  </body>
</html>
